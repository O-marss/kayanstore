<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة المدير - الحضور والانصراف</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    /></noscript>
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface2: #222;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.14);
        --text: #f0ede8;
        --muted: #888;
        --green: #4ade80;
        --green-bg: rgba(74, 222, 128, 0.1);
        --amber: #fbbf24;
        --amber-bg: rgba(251, 191, 36, 0.1);
        --red: #f87171;
        --red-bg: rgba(248, 113, 113, 0.1);
        --accent: #a3e635;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "IBM Plex Sans Arabic", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* LOGIN */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }
      .login-box {
        width: 100%;
        max-width: 360px;
      }
      .login-logo {
        text-align: center;
        margin-bottom: 2rem;
      }
      .login-logo-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: var(--accent);
        margin-bottom: 10px;
      }
      .login-logo-mark svg {
        width: 26px;
        height: 26px;
      }
      .login-logo h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .login-logo p {
        font-size: 13px;
        color: var(--muted);
        margin-top: 3px;
      }
      .login-card {
        background: var(--surface);
        border: 0.5px solid var(--border2);
        border-radius: 18px;
        padding: 1.75rem;
      }
      .login-card h2 {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 1.25rem;
        color: var(--muted);
      }
      .field {
        margin-bottom: 1rem;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }
      .field input {
        width: 100%;
        background: var(--surface2);
        border: 0.5px solid var(--border2);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 16px;
        color: var(--text);
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
        letter-spacing: 3px;
        text-align: center;
      }
      .field input:focus {
        border-color: var(--accent);
      }
      .btn-login {
        width: 100%;
        background: var(--accent);
        border: none;
        border-radius: 12px;
        padding: 13px;
        font-size: 15px;
        font-weight: 500;
        color: #0f0f0f;
        font-family: inherit;
        cursor: pointer;
        margin-top: 0.25rem;
        transition: opacity 0.2s;
      }
      .btn-login:hover {
        opacity: 0.88;
      }
      .shake {
        animation: shake 0.4s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }
      .login-error {
        background: var(--red-bg);
        border: 0.5px solid rgba(248, 113, 113, 0.3);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        color: var(--red);
        margin-top: 12px;
        display: none;
        text-align: center;
      }

      /* DASHBOARD */
      #dashboard {
        display: none;
        padding: 1.5rem;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        max-width: 900px;
        margin-inline: auto;
      }
      .topbar h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .live-label {
        font-size: 12px;
        color: var(--green);
      }
      .user-chip {
        font-size: 12px;
        color: var(--muted);
        background: var(--surface);
        border: 0.5px solid var(--border2);
        border-radius: 20px;
        padding: 4px 10px;
      }
      .btn-logout {
        background: transparent;
        border: 0.5px solid var(--border2);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12px;
        color: var(--muted);
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-logout:hover {
        border-color: var(--red);
        color: var(--red);
      }
      .main {
        max-width: 900px;
        margin: 0 auto;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 1.25rem;
      }
      .stat-card {
        background: var(--surface);
        border: 0.5px solid var(--border2);
        border-radius: 14px;
        padding: 1rem 1.25rem;
      }
      .stat-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .stat-val {
        font-size: 28px;
        font-weight: 300;
      }
      .stat-val.g {
        color: var(--green);
      }
      .stat-val.a {
        color: var(--amber);
      }
      .stat-val.r {
        color: var(--red);
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      input[type="date"],
      select {
        background: var(--surface);
        border: 0.5px solid var(--border2);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        color: var(--text);
        font-family: inherit;
        outline: none;
      }
      input[type="date"]:focus,
      select:focus {
        border-color: var(--accent);
      }
      .btn-refresh {
        background: var(--surface);
        border: 0.5px solid var(--border2);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 13px;
        color: var(--text);
        font-family: inherit;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .btn-refresh:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-export {
        background: var(--accent);
        border: none;
        border-radius: 10px;
        padding: 8px 16px;
        font-size: 13px;
        color: #0f0f0f;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        margin-right: auto;
      }
      .btn-export:hover {
        opacity: 0.9;
      }
      .table-wrap {
        background: var(--surface);
        border: 0.5px solid var(--border2);
        border-radius: 16px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        padding: 12px 16px;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        text-align: right;
        border-bottom: 0.5px solid var(--border2);
        white-space: nowrap;
      }
      tbody tr {
        border-bottom: 0.5px solid var(--border);
        transition: background 0.15s;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: var(--surface2);
      }
      tbody td {
        padding: 12px 16px;
        font-size: 14px;
        vertical-align: middle;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
      }
      .badge-g {
        background: var(--green-bg);
        color: var(--green);
      }
      .badge-a {
        background: var(--amber-bg);
        color: var(--amber);
      }
      .badge-r {
        background: var(--red-bg);
        color: var(--red);
      }
      .time-chip {
        font-size: 12px;
        color: var(--muted);
        background: var(--surface2);
        padding: 2px 8px;
        border-radius: 6px;
      }
      .note-text {
        font-size: 12px;
        color: var(--muted);
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 500;
        margin-left: 10px;
        flex-shrink: 0;
      }
      .emp-cell {
        display: flex;
        align-items: center;
      }
      .av0 {
        background: rgba(74, 222, 128, 0.15);
        color: var(--green);
      }
      .av1 {
        background: rgba(251, 191, 36, 0.15);
        color: var(--amber);
      }
      .av2 {
        background: rgba(163, 230, 53, 0.15);
        color: var(--accent);
      }
      .av3 {
        background: rgba(248, 113, 113, 0.15);
        color: var(--red);
      }
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
        font-size: 14px;
      }
      .loading-state {
        text-align: center;
        padding: 2rem;
        color: var(--muted);
        font-size: 14px;
      }
      .back-link {
        font-size: 13px;
        color: var(--muted);
        text-decoration: none;
      }
      .back-link:hover {
        color: var(--text);
      }
      @media (max-width: 600px) {
        .stats-row {
          grid-template-columns: 1fr 1fr;
        }
        .stats-row .stat-card:last-child {
          grid-column: span 2;
        }
        thead th:nth-child(4),
        tbody td:nth-child(4) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">
          <div class="login-logo-mark">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#0f0f0f"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </div>
          <h1>لوحة المدير</h1>
          <p>مخصصة للمشرفين فقط</p>
        </div>
        <div class="login-card" id="login-card">
          <h2>ادخل كلمة المرور للمتابعة</h2>
          <div class="field">
            <input
              type="password"
              id="pw-input"
              placeholder="••••••••"
              autocomplete="off"
            />
          </div>
          <button class="btn-login" onclick="checkPassword()">دخول</button>
          <div class="login-error" id="login-error">
            كلمة المرور غلط، حاول تاني
          </div>
          <a
            href="index.html"
            style="
              display: block;
              text-align: center;
              margin-top: 14px;
              font-size: 13px;
              color: var(--muted);
              text-decoration: none;
            "
            >← رجوع لصفحة التسجيل</a
          >
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="topbar">
        <div style="display: flex; align-items: center; gap: 12px">
          <button
            onclick="window.location.href = 'index.html'"
            class="btn-logout"
          >
            ← رجوع
          </button>
          <h1>لوحة المدير</h1>
        </div>
        <div class="topbar-right">
          <div class="live-dot"></div>
          <span class="live-label">Live</span>
          <button class="btn-logout" onclick="doLogout()">خروج</button>
        </div>
      </div>

      <div class="main">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">حضور اليوم</div>
            <div class="stat-val g" id="s-present">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">انصراف</div>
            <div class="stat-val a" id="s-checkout">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">غياب</div>
            <div class="stat-val r" id="s-absent">—</div>
          </div>
        </div>
        <div class="controls">
          <input type="date" id="filter-date" />
          <select id="filter-action">
            <option value="">كل الحركات</option>
            <option value="حضور">حضور فقط</option>
            <option value="انصراف">انصراف فقط</option>
            <option value="غياب">غياب فقط</option>
          </select>
          <button class="btn-refresh" onclick="loadData()">↻ تحديث</button>
          <button class="btn-export" onclick="exportCSV()">تصدير CSV</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>الموظف</th>
                <th>الحالة</th>
                <th>الوقت</th>
                <th>التاريخ</th>
                <th>ملاحظة</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr>
                <td colspan="5" class="loading-state">جاري التحميل...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // =============================================
      // ⚙️ ضع بيانات Supabase هنا
      // =============================================
      const SUPABASE_URL = "https://moeolrwkmvicpxjhuqmc.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vZW9scndrbXZpY3B4amh1cW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjI0NDIsImV4cCI6MjA4OTIzODQ0Mn0.BmkrnrqxdpsIWvYZMxPVC_SH8rFVZgVCcegOf2c0Uzw";

      // ⚙️ كلمة مرور لوحة المدير — غيّرها لأي كلمة تحبها
      const ADMIN_PASSWORD = "admin1234";
      // =============================================

      const { createClient } = supabase;

      if (SUPABASE_URL === "YOUR_SUPABASE_URL") {
        document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;font-family:sans-serif;background:#0f0f0f;color:#f87171;text-align:center;flex-direction:column;gap:1rem">
      <div style="font-size:32px">⚠️</div>
      <div style="font-size:16px;font-weight:500">Supabase مش متربط</div>
      <div style="font-size:13px;color:#888;max-width:300px">افتح الملف وحط الـ SUPABASE_URL و SUPABASE_ANON_KEY الصحيحين</div>
    </div>`;
      }

      const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // ---- PASSWORD GATE ----
      function checkPassword() {
        const val = document.getElementById("pw-input").value;
        const errEl = document.getElementById("login-error");
        const card = document.getElementById("login-card");

        if (val === ADMIN_PASSWORD) {
          sessionStorage.setItem("admin_ok", "1");
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("dashboard").style.display = "block";
          initDashboard();
        } else {
          errEl.style.display = "block";
          card.classList.remove("shake");
          void card.offsetWidth; // restart animation
          card.classList.add("shake");
          document.getElementById("pw-input").value = "";
        }
      }

      // Check if already authenticated this session
      if (sessionStorage.getItem("admin_ok") === "1") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
      }

      document.addEventListener("DOMContentLoaded", () => {
        if (sessionStorage.getItem("admin_ok") === "1") initDashboard();
      });

      document.getElementById("pw-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") checkPassword();
      });

      // ---- DASHBOARD ----
      const avC = ["av0", "av1", "av2", "av3"];
      let allRecords = [],
        avMap = {},
        avN = 0;
      function pad(n) {
        return String(n).padStart(2, "0");
      }
      function getAv(n) {
        if (!avMap[n]) avMap[n] = avC[avN++ % 4];
        return avMap[n];
      }
      function initials(n) {
        return n
          .trim()
          .split(/\s+/)
          .slice(0, 2)
          .map((w) => w[0])
          .join("");
      }

      function initDashboard() {
        document.getElementById("filter-date").value = new Date()
          .toISOString()
          .split("T")[0];
        document
          .getElementById("filter-date")
          .addEventListener("change", loadData);
        document
          .getElementById("filter-action")
          .addEventListener("change", loadData);
        db.channel("att-live")
          .on(
            "postgres_changes",
            { event: "INSERT", schema: "public", table: "attendance" },
            () => loadData(),
          )
          .subscribe();
        loadData();
      }

      async function loadData() {
        const d = document.getElementById("filter-date").value;
        const a = document.getElementById("filter-action").value;
        document.getElementById("table-body").innerHTML =
          '<tr><td colspan="5" class="loading-state">جاري التحميل...</td></tr>';
        let q = db
          .from("attendance")
          .select("*")
          .eq("date", d)
          .order("recorded_at", { ascending: false });
        if (a) q = q.eq("action", a);
        const { data, error } = await q;
        if (error) {
          console.error(error);
          return;
        }
        allRecords = data || [];
        document.getElementById("s-present").textContent = allRecords.filter(
          (r) => r.action === "حضور",
        ).length;
        document.getElementById("s-checkout").textContent = allRecords.filter(
          (r) => r.action === "انصراف",
        ).length;
        document.getElementById("s-absent").textContent = allRecords.filter(
          (r) => r.action === "غياب",
        ).length;
        if (!allRecords.length) {
          document.getElementById("table-body").innerHTML =
            '<tr><td colspan="5" class="empty-state">لا يوجد سجلات لهذا اليوم</td></tr>';
          return;
        }
        document.getElementById("table-body").innerHTML = allRecords
          .map((r) => {
            const bc =
              r.action === "حضور"
                ? "badge-g"
                : r.action === "انصراف"
                  ? "badge-a"
                  : "badge-r";
            const dt = new Date(r.recorded_at);
            const t = pad(dt.getHours()) + ":" + pad(dt.getMinutes());
            const dd =
              dt.getDate() + "/" + (dt.getMonth() + 1) + "/" + dt.getFullYear();
            return `<tr>
      <td><div class="emp-cell"><div class="avatar ${getAv(r.employee_name)}">${initials(r.employee_name)}</div><span>${r.employee_name}</span></div></td>
      <td><span class="badge ${bc}">${r.action}</span></td>
      <td><span class="time-chip">${t}</span></td>
      <td style="font-size:13px;color:var(--muted)">${dd}</td>
      <td>${r.note ? `<span class="note-text">${r.note}</span>` : '<span style="color:var(--border2)">—</span>'}</td>
    </tr>`;
          })
          .join("");
      }

      function exportCSV() {
        if (!allRecords.length) {
          alert("لا يوجد بيانات");
          return;
        }
        const rows = allRecords
          .map(
            (r) =>
              `"${r.employee_name}","${r.action}","${new Date(r.recorded_at).toLocaleTimeString("ar-EG")}","${r.date}","${r.note || ""}"`,
          )
          .join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(
          new Blob(["\uFEFF" + "الاسم,الحالة,الوقت,التاريخ,ملاحظة\n" + rows], {
            type: "text/csv;charset=utf-8",
          }),
        );
        a.download = `attendance_${document.getElementById("filter-date").value}.csv`;
        a.click();
      }

      function doLogout() {
        sessionStorage.removeItem("admin_ok");
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("pw-input").value = "";
        document.getElementById("login-error").style.display = "none";
      }
    </script>
  </body>
</html>
